<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRS — 이슈 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Pretendard,sans-serif;font-size:14px;line-height:20px;color:#343434;background:#f5f5f5;min-height:100vh;display:flex;}
svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
button{font-family:inherit;cursor:pointer;border:none;background:transparent;}

/* ── LNB ── */
.lnb{width:220px;min-height:100vh;background:#fff;border-right:1px solid #dfdfdf;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;}
.lnb-inner{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
.lnb-global{padding:10px;border-bottom:1px solid #dfdfdf;}
.lnb-global-row{display:flex;align-items:center;height:48px;padding:0 8px;border-radius:8px;}
.lnb-logo{width:32px;height:32px;border-radius:8px;background:#6f64dd;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.lnb-global-name{font-size:15px;font-weight:600;color:#343434;margin-left:12px;flex:1;}
.lnb-notif{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#848484;position:relative;}
.lnb-notif:hover{background:#f5f5f5;}
.badge-dot{position:absolute;top:6px;right:6px;width:4px;height:4px;border-radius:50%;background:#f04040;}
.lnb-section{padding:8px 10px 4px;}
.lnb-item{display:flex;align-items:center;height:40px;padding:0 8px;border-radius:8px;cursor:pointer;color:#343434;gap:8px;font-size:14px;}
.lnb-item:hover{background:#f5f5f5;}
.lnb-item-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#848484;}
.lnb-divider{height:1px;background:#dfdfdf;margin:4px 10px;}
.lnb-project-header{display:flex;align-items:center;height:48px;padding:0 8px;margin:0 10px;border-radius:8px;cursor:pointer;gap:8px;}
.lnb-project-header:hover{background:#f5f5f5;}
.project-avatar-sm{width:32px;height:32px;border-radius:8px;background:#6f64dd;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.lnb-project-name{font-size:14px;font-weight:600;color:#343434;flex:1;}
.lnb-sub-items{padding:0 10px;}
.lnb-sub-item{display:flex;align-items:center;height:40px;padding:0 8px 0 16px;border-radius:8px;cursor:pointer;color:#343434;font-size:14px;gap:8px;text-decoration:none;}
.lnb-sub-item:hover{background:#f5f5f5;}
.lnb-sub-item.active{background:#f0f0f0;font-weight:500;}
.lnb-sub-icon{width:16px;height:16px;color:#848484;}
.lnb-user{padding:12px 10px;border-top:1px solid #dfdfdf;display:flex;align-items:center;gap:8px;margin-top:auto;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:#6f64dd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:500;}
.user-email{font-size:11px;color:#848484;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-more{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#848484;border-radius:4px;cursor:pointer;}
.user-more:hover{background:#f5f5f5;}

/* ── Content ── */
.content-wrapper{margin-left:220px;flex:1;min-height:100vh;background:#f5f5f5;display:flex;flex-direction:column;}
.content-inner{flex:1;max-width:1200px;width:100%;margin:0 auto;padding:40px 40px 80px;}

/* ── Page Header ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:18px;font-weight:600;line-height:28px;}
.header-actions{display:flex;align-items:center;gap:8px;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap;}
.btn-ghost{background:#fff;border:1px solid #d2d2d2;color:#343434;box-shadow:0 1px 2px rgba(16,24,40,.06);}
.btn-ghost:hover{background:#f9f9f9;}
.btn-primary{background:#343434;border:1px solid #343434;color:#fff;box-shadow:0 1px 3px rgba(16,24,40,.10),0 1px 2px rgba(16,24,40,.06);}
.btn-primary:hover{background:#222;}
.btn-primary:disabled{background:#aeaeae;border-color:#aeaeae;cursor:not-allowed;}
.btn-filter{position:relative;}
.filter-count{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#6f64dd;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}

/* ── Search ── */
.search-wrap{position:relative;}
.search-wrap input{height:36px;width:260px;padding:0 12px 0 36px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;background:#fff;}
.search-wrap input:focus{border-color:#6f64dd;box-shadow:0 0 0 2px rgba(111,100,221,.12);}
.search-wrap input::placeholder{color:#aeaeae;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aeaeae;pointer-events:none;}

/* ── Issue Table ── */
.table-wrap{background:#fff;border:1px solid #dfdfdf;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.05);}
.table-head{display:grid;grid-template-columns:32px 1fr 90px 80px 56px 120px;gap:0;padding:0 16px;height:40px;background:#f9f9f9;border-bottom:1px solid #dfdfdf;align-items:center;}
.th{font-size:12px;font-weight:500;color:#848484;}
.table-body{}

/* Row */
.issue-row{display:grid;grid-template-columns:32px 1fr 90px 80px 56px 120px;gap:0;padding:0 16px;height:48px;align-items:center;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s;position:relative;}
.issue-row:last-child{border-bottom:none;}
.issue-row:hover{background:#f9f9f9;}
.issue-row.selected{background:#f2f1fe;}

.row-expand{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#aeaeae;border-radius:4px;flex-shrink:0;transition:transform .2s;}
.row-expand:hover{background:#f0f0f0;color:#848484;}
.row-expand.open{transform:rotate(90deg);}
.row-expand.leaf{cursor:default;}
.row-expand.leaf:hover{background:transparent;color:#aeaeae;}

.row-main{display:flex;align-items:center;gap:8px;min-width:0;}
.row-indent{flex-shrink:0;}
.issue-type-badge{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.type-epic{background:#f2f1fe;color:#6f64dd;}
.type-story{background:#e0eeff;color:#174fde;}
.type-task{background:#e6fef0;color:#077a36;}
.type-subtask{background:#f0f0f0;color:#848484;}
.type-bug{background:#fff5f5;color:#c0251b;}

.issue-key{font-size:11px;color:#aeaeae;flex-shrink:0;font-weight:500;}
.issue-title{font-size:14px;color:#343434;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.version-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;background:#f0f0f0;color:#848484;}

.assignee-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.av-purple{background:#6f64dd;}
.av-green{background:#2da44e;}
.av-orange{background:#e36f1e;}
.av-blue{background:#174fde;}
.av-red{background:#c0251b;}

.status-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;}
.s-todo{background:#f0f0f0;color:#848484;}
.s-progress{background:#e0eeff;color:#174fde;}
.s-review{background:#fffadb;color:#a07800;}
.s-done{background:#e6fef0;color:#077a36;}
.s-block{background:#fff5f5;color:#c0251b;}

/* Sub-rows */
.sub-rows{display:none;}
.sub-rows.open{display:block;}

/* ── Empty / Loading states ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;color:#aeaeae;}
.empty-state svg{color:#d2d2d2;}
.empty-state p{font-size:14px;}

/* ══════════ FILTER PANEL ══════════ */
.filter-overlay{position:fixed;inset:0;z-index:100;display:none;}
.filter-overlay.open{display:block;}
.filter-panel{position:absolute;top:96px;left:260px;width:520px;background:#fff;border:1px solid #dfdfdf;border-radius:12px;box-shadow:0 4px 8px rgba(16,24,40,.10),0 2px 4px rgba(16,24,40,.06);display:flex;flex-direction:column;overflow:hidden;}
.filter-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #dfdfdf;}
.filter-panel-title{font-size:15px;font-weight:600;}
.filter-body{display:flex;height:300px;}
.filter-tabs{width:140px;border-right:1px solid #dfdfdf;padding:8px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.filter-tab{padding:8px 12px;border-radius:8px;font-size:14px;color:#343434;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.filter-tab:hover{background:#f5f5f5;}
.filter-tab.active{background:#f2f1fe;color:#6f64dd;font-weight:500;}
.filter-tab-count{font-size:11px;background:#6f64dd;color:#fff;border-radius:8px;padding:0 5px;height:16px;display:inline-flex;align-items:center;}
.filter-options{flex:1;padding:12px 16px;overflow-y:auto;}
.filter-option-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid #dfdfdf;font-size:13px;cursor:pointer;margin:4px;transition:background .1s,border-color .1s;}
.filter-option-chip:hover{background:#f5f5f5;}
.filter-option-chip.selected{background:#f2f1fe;border-color:#6f64dd;color:#6f64dd;font-weight:500;}
.filter-panel-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid #dfdfdf;}
.btn-reset{font-size:14px;color:#848484;cursor:pointer;}
.btn-reset:hover{color:#343434;}
.filter-search{width:100%;height:32px;padding:0 10px;border:1px solid #d2d2d2;border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;}
.filter-search:focus{border-color:#6f64dd;}
.filter-member-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:6px;cursor:pointer;}
.filter-member-item:hover{background:#f5f5f5;}
.filter-member-item.selected{background:#f2f1fe;}
.filter-member-item input[type=checkbox]{accent-color:#6f64dd;width:14px;height:14px;}

/* ══════════ ISSUE CREATE MODAL ══════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 24px rgba(16,24,40,.15);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #dfdfdf;}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#848484;cursor:pointer;}
.modal-close:hover{background:#f5f5f5;}
.modal-body{padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.modal-footer{padding:16px 24px;border-top:1px solid #dfdfdf;display:flex;justify-content:flex-end;gap:8px;}

.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:13px;font-weight:500;color:#343434;}
.form-label span.required{color:#f04040;margin-left:2px;}
.form-input{height:36px;padding:0 12px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;}
.form-input:focus{border-color:#6f64dd;box-shadow:0 0 0 2px rgba(111,100,221,.12);}
.form-input::placeholder{color:#aeaeae;}
.form-input.error{border-color:#f04040;}
.form-error{font-size:12px;color:#f04040;}
.form-textarea{padding:10px 12px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;resize:vertical;min-height:80px;}
.form-textarea:focus{border-color:#6f64dd;box-shadow:0 0 0 2px rgba(111,100,221,.12);}
.form-textarea::placeholder{color:#aeaeae;}
.form-select{height:36px;padding:0 10px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;background:#fff;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23848484' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;}
.form-select:focus{border-color:#6f64dd;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ══════════ ISSUE DETAIL PANEL ══════════ */
.detail-panel{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:#fff;border-left:1px solid #dfdfdf;box-shadow:-4px 0 12px rgba(16,24,40,.08);z-index:150;display:flex;flex-direction:column;transition:right .25s ease;}
.detail-panel.open{right:0;}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #dfdfdf;flex-shrink:0;}
.detail-header-left{display:flex;align-items:center;gap:8px;}
.detail-key{font-size:12px;color:#848484;font-weight:500;}
.detail-actions{display:flex;gap:4px;}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#848484;cursor:pointer;border:none;background:transparent;}
.icon-btn:hover{background:#f5f5f5;}
.detail-body{flex:1;overflow-y:auto;padding:20px;}
.detail-title{font-size:16px;font-weight:600;margin-bottom:20px;line-height:24px;}
.detail-section{margin-bottom:20px;}
.detail-section-title{font-size:12px;font-weight:600;color:#848484;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
.meta-grid{display:flex;flex-direction:column;gap:8px;}
.meta-row{display:flex;align-items:center;gap:0;}
.meta-key{font-size:13px;color:#848484;width:96px;flex-shrink:0;}
.meta-val{font-size:13px;color:#343434;display:flex;align-items:center;gap:6px;}
.detail-divider{height:1px;background:#f0f0f0;margin:16px 0;}
.sub-issue-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.sub-issue-item:last-child{border-bottom:none;}
.checklist-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;}
.checklist-item input[type=checkbox]{accent-color:#6f64dd;margin-top:3px;width:14px;height:14px;flex-shrink:0;}
.checklist-item label{font-size:14px;color:#343434;cursor:pointer;}
.checklist-item.checked label{text-decoration:line-through;color:#aeaeae;}
.add-sub-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:#6f64dd;cursor:pointer;padding:6px 0;margin-top:4px;}
.add-sub-btn:hover{opacity:.8;}

/* ══════════ VERSION MODAL ══════════ */
.version-modal{background:#fff;border-radius:16px;width:480px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 24px rgba(16,24,40,.15);}
.version-list{flex:1;overflow-y:auto;padding:8px 0;}
.version-row{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid #f0f0f0;}
.version-row:hover{background:#f9f9f9;}
.version-name{flex:1;font-size:14px;font-weight:500;}
.version-status-select{height:28px;padding:0 8px;border-radius:6px;font-size:12px;font-weight:500;font-family:inherit;border:none;outline:none;cursor:pointer;appearance:none;padding-right:20px;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23848484' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;}
.vs-scheduled{background:#f0f0f0;color:#848484;}
.vs-progress{background:#e0eeff;color:#174fde;}
.vs-done{background:#e6fef0;color:#077a36;}
.vs-wait{background:#fffadb;color:#a07800;}
.delete-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:#aeaeae;cursor:pointer;}
.delete-btn:hover{background:#fff5f5;color:#f04040;}
.delete-btn:disabled{opacity:.3;cursor:not-allowed;}
.version-add-area{padding:16px 20px;border-top:1px solid #dfdfdf;display:flex;flex-direction:column;gap:10px;}
.version-add-hint{font-size:12px;color:#aeaeae;}
.version-add-row{display:flex;gap:8px;align-items:flex-start;}
.version-input{flex:1;height:36px;padding:0 12px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.version-input:focus{border-color:#6f64dd;}
.version-input.error-field{border-color:#f04040;}
.version-add-error{font-size:12px;color:#f04040;margin-top:-4px;}

/* ══════════ CONFIRM DIALOG ══════════ */
.confirm-dialog{background:#fff;border-radius:12px;width:360px;padding:24px;box-shadow:0 8px 24px rgba(16,24,40,.15);}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.confirm-desc{font-size:14px;color:#848484;line-height:22px;margin-bottom:20px;}
.confirm-footer{display:flex;justify-content:flex-end;gap:8px;}
.btn-danger{background:#f04040;border:1px solid #f04040;color:#fff;border-radius:8px;height:36px;padding:0 16px;font-size:14px;font-weight:500;cursor:pointer;}
.btn-danger:hover{background:#d93030;}

/* Active filter chips row */
.active-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.active-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 10px;background:#f2f1fe;border:1px solid #c8c3f5;border-radius:20px;font-size:12px;color:#6f64dd;}
.active-chip-x{cursor:pointer;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.active-chip-x:hover{background:#ddd8f8;}
</style>
</head>
<body>

      <div class="lnb-sub-items">
        <a class="lnb-sub-item" href="project-home.html">
          <svg class="lnb-sub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          프로젝트 홈
        </a>
        <a class="lnb-sub-item" href="#">
          <svg class="lnb-sub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          기획 문서
        </a>
        <a class="lnb-sub-item active" href="issue-list.html">
          <svg class="lnb-sub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          이슈 목록

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const VERSIONS = [

  { id:'v840', name:'v8.4.0', status:'progress', issueCount:5 },

const ISSUES = [
  {
    id:'prs-1', key:'PRS-1', type:'epic', title:'OKR 관리', version:'v8.3.0', assignee:{name:'이상엽',cls:'av-purple',initial:'이'}, status:'progress',

        children:[
          {id:'prs-12',key:'PRS-12',type:'subtask',title:'API 연동 구현',version:'v8.4.0',assignee:{name:'박길동',cls:'av-blue',initial:'박'},status:'todo',children:[]},
          {id:'prs-13',key:'PRS-13',type:'subtask',title:'UI 컴포넌트 작성',version:'v8.4.0',assignee:{name:'이상엽',cls:'av-purple',initial:'이'},status:'progress',children:[]},
        ]
      },
      {id:'prs-6',key:'PRS-6',type:'task',title:'캘린더 CRUD',version:'v8.4.0',assignee:{name:'이상엽',cls:'av-purple',initial:'이'},status:'review',children:[]},
      {id:'prs-9',key:'PRS-9',type:'task',title:'우선순위 정렬 기능',version:'v8.3.0',assignee:{name:'김길동',cls:'av-green',initial:'김'},status:'done',children:[]},
    ]
  },
  {
    id:'prs-2', key:'PRS-2', type:'epic', title:'AI 회의록 기능', version:'v8.4.0', assignee:{name:'홍길동',cls:'av-orange',initial:'홍'}, status:'progress',
    children:[
      {id:'prs-7',key:'PRS-7',type:'story',title:'회의록 자동 요약',version:'v8.4.0',assignee:{name:'홍길동',cls:'av-orange',initial:'홍'},status:'progress',children:[]},
      {id:'prs-8',key:'PRS-8',type:'bug',title:'회의록 저장 시 오류 발생',version:'v8.3.0',assignee:{name:'김길동',cls:'av-green',initial:'김'},status:'block',children:[]},
      {id:'prs-10',key:'PRS-10',type:'task',title:'AI 피드백 UI 개선',version:'v8.5.0',assignee:{name:'이상엽',cls:'av-purple',initial:'이'},status:'todo',children:[]},
    ]
  },
  {
    id:'prs-3', key:'PRS-3', type:'epic', title:'캘린더 뷰', version:'v8.5.0', assignee:{name:'박길동',cls:'av-blue',initial:'박'}, status:'todo',
    children:[
      {id:'prs-11',key:'PRS-11',type:'story',title:'월간 캘린더 뷰',version:'v8.5.0',assignee:{name:'이상엽',cls:'av-purple',initial:'이'},status:'todo',children:[]},
    ]
  },
  {
    id:'prs-4', key:'PRS-4', type:'epic', title:'그라운드룰 관리', version:'v8.3.0', assignee:{name:'김길동',cls:'av-green',initial:'김'}, status:'done',
    children:[]
  },
];

// ── Filter state
const filterState = { type:[], status:[], priority:[], assignee:[], version:[] };
let activeFilterTab = 'type';
let searchQuery = '';
let expandedRows = new Set(['prs-1','prs-2','prs-3']);
let selectedRow = null;

// ── Version state (clone for modal)
let versions = JSON.parse(JSON.stringify(VERSIONS));

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const typeLabel = { epic:'E', story:'S', task:'T', subtask:'ST', bug:'B' };
const typeCls   = { epic:'type-epic', story:'type-story', task:'type-task', subtask:'type-subtask', bug:'type-bug' };
const typeText  = { epic:'Epic', story:'Story', task:'Task', subtask:'Sub-task', bug:'Bug' };
const statusCls = { todo:'s-todo', progress:'s-progress', review:'s-review', done:'s-done', block:'s-block' };
const statusText= { todo:'할 일', progress:'진행중', review:'검토 요청', done:'완료', block:'블로킹' };
const vStatusCls= { scheduled:'vs-scheduled', progress:'vs-progress', done:'vs-done', wait:'vs-wait', hold:'vs-wait', cancel:'vs-scheduled' };
const vStatusText={ scheduled:'예정', progress:'진행중', done:'완료', wait:'대기', hold:'보류', cancel:'취소' };

function typeBadge(t){return `<span class="issue-type-badge ${typeCls[t]}">${typeLabel[t]}</span>`;}
function statusBadge(s){return `<span class="status-badge ${statusCls[s]}">${statusText[s]}</span>`;}
function assigneeAvatar(a){return `<span class="assignee-avatar ${a.cls}" title="${a.name}">${a.initial}</span>`;}

// ══════════════════════════════════════
// TABLE RENDERING
// ══════════════════════════════════════
function flattenWithFilter(issues, query, filters){
  const hasFilter = query || Object.values(filters).some(a=>a.length);
  if(!hasFilter) return null; // tree mode
  let flat=[];
  function walk(list){list.forEach(i=>{
    const matchQ = !query || i.title.toLowerCase().includes(query.toLowerCase()) || i.key.toLowerCase().includes(query.toLowerCase());
    const matchType = !filters.type.length || filters.type.includes(i.type);
    const matchStatus = !filters.status.length || filters.status.includes(i.status);
    const matchVer = !filters.version.length || filters.version.includes(i.version);
    const matchAssignee = !filters.assignee.length || filters.assignee.includes(i.assignee.name);
    if(matchQ&&matchType&&matchStatus&&matchVer&&matchAssignee) flat.push(i);
    if(i.children) walk(i.children);
  });}
  walk(issues);
  return flat;
}

function renderTable(){
  const body = document.getElementById('tableBody');
  const flat = flattenWithFilter(ISSUES, searchQuery, filterState);
  if(flat !== null){
    // flat mode
    if(!flat.length){
      body.innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>조건에 맞는 이슈가 없습니다.</p></div>`;
      return;
    }
    body.innerHTML = flat.map(i=>renderRow(i,0,false)).join('');
  } else {
    // tree mode
    body.innerHTML = ISSUES.map(i=>renderRowTree(i,0)).join('');
  }
  attachRowEvents();
}

function renderRow(issue, depth, hasChildren){
  const sel = selectedRow===issue.id ? 'selected' : '';
  const indent = depth*20;
  return `<div class="issue-row ${sel}" data-id="${issue.id}" onclick="selectRow('${issue.id}',event)">
    <div class="row-expand leaf"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="row-main">
      <div class="row-indent" style="width:${indent}px"></div>
      ${typeBadge(issue.type)}
      <span class="issue-key">${issue.key}</span>
      <span class="issue-title">${issue.title}</span>
    </div>
    <div><span class="version-tag">${issue.version||'—'}</span></div>
    <div>${assigneeAvatar(issue.assignee)}</div>
    <div></div>
    <div>${statusBadge(issue.status)}</div>
  </div>`;
}

function renderRowTree(issue, depth){
  const hasChildren = issue.children && issue.children.length>0;
  const isOpen = expandedRows.has(issue.id);
  const sel = selectedRow===issue.id ? 'selected' : '';
  const indent = depth*20;
  let html = `<div>
    <div class="issue-row ${sel}" data-id="${issue.id}" onclick="selectRow('${issue.id}',event)">
      <div class="row-expand${hasChildren?'':' leaf'}${isOpen?' open':''}" onclick="${hasChildren?`toggleRow('${issue.id}',event)`:''}" style="${hasChildren?'':'pointer-events:none'}">
        ${hasChildren?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`:''}
      </div>
      <div class="row-main">
        <div class="row-indent" style="width:${indent}px"></div>
        ${typeBadge(issue.type)}
        <span class="issue-key">${issue.key}</span>
        <span class="issue-title">${issue.title}</span>
      </div>
      <div><span class="version-tag">${issue.version||'—'}</span></div>
      <div>${assigneeAvatar(issue.assignee)}</div>
      <div></div>
      <div>${statusBadge(issue.status)}</div>
    </div>`;
  if(hasChildren){
    html += `<div class="sub-rows${isOpen?' open':''}" id="sub-${issue.id}">`;
    issue.children.forEach(c=>{ html+=renderRowTree(c,depth+1); });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function attachRowEvents(){}

function toggleRow(id, e){
  e.stopPropagation();
  if(expandedRows.has(id)) expandedRows.delete(id);
  else expandedRows.add(id);
  renderTable();
}

function selectRow(id, e){
  selectedRow = id;
  renderTable();
  openDetail(id);
}

// ══════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════
function findIssue(id, list=ISSUES){
  for(const i of list){
    if(i.id===id) return i;
    if(i.children){const f=findIssue(id,i.children);if(f)return f;}
  }
  return null;
}

function openDetail(id){
  const issue = findIssue(id);
  if(!issue) return;
  document.getElementById('detailKey').textContent = issue.key;
  document.getElementById('detailBody').innerHTML = buildDetailHTML(issue);
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  selectedRow = null;
  renderTable();
}

function buildDetailHTML(issue){
  const subs = issue.children||[];
  return `
    <div class="detail-title">${issue.title}</div>
    <div class="detail-section">
      <div class="detail-section-title">메타 정보</div>
      <div class="meta-grid">
        <div class="meta-row"><span class="meta-key">이슈 타입</span><span class="meta-val">${typeBadge(issue.type)} ${typeText[issue.type]}</span></div>
        <div class="meta-row"><span class="meta-key">상태</span><span class="meta-val">${statusBadge(issue.status)}</span></div>
        <div class="meta-row"><span class="meta-key">우선순위</span><span class="meta-val">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a07800" stroke-width="2"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg> 보통
        </span></div>
        <div class="meta-row"><span class="meta-key">담당자</span><span class="meta-val">${assigneeAvatar(issue.assignee)} ${issue.assignee.name}</span></div>
        <div class="meta-row"><span class="meta-key">버전</span><span class="meta-val"><span class="version-tag">${issue.version||'미배정'}</span></span></div>
        <div class="meta-row"><span class="meta-key">상위 이슈</span><span class="meta-val">${issue.type==='epic'?'없음':'—'}</span></div>
        <div class="meta-row"><span class="meta-key">생성일</span><span class="meta-val" style="color:#848484">7주 전</span></div>
        <div class="meta-row"><span class="meta-key">연결 기획서</span><span class="meta-val" style="color:#6f64dd;cursor:pointer;">PRD v1.4 캘린더 CRUD</span></div>
      </div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-section">
      <div class="detail-section-title">하위 이슈 (${subs.length})</div>
      ${subs.map(s=>`
        <div class="sub-issue-item">
          ${typeBadge(s.type)}
          <span style="font-size:11px;color:#aeaeae;">${s.key}</span>
          <span style="font-size:13px;flex:1;">${s.title}</span>
          ${statusBadge(s.status)}
        </div>
      `).join('')}
      <div class="add-sub-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        하위 이슈 추가
      </div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-section">
      <div class="detail-section-title">설명</div>
      <textarea class="form-textarea" style="width:100%;min-height:80px;margin-top:4px;" placeholder="이슈에 대한 설명을 입력하세요">OKR 관리 기능의 전반적인 흐름을 정의하고 구현한다.</textarea>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-section">
      <div class="detail-section-title">체크리스트</div>
      <div class="checklist-item"><input type="checkbox" id="c1" checked onchange="toggleCheck(this)"><label for="c1">기획서 초안 작성</label></div>
      <div class="checklist-item"><input type="checkbox" id="c2" onchange="toggleCheck(this)"><label for="c2">PRD 리뷰 완료</label></div>
      <div class="checklist-item"><input type="checkbox" id="c3" onchange="toggleCheck(this)"><label for="c3">디자인 QA</label></div>
      <div class="checklist-item"><input type="checkbox" id="c4" onchange="toggleCheck(this)"><label for="c4">개발 확인 및 배포</label></div>
      <div class="add-sub-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        항목 추가
      </div>
    </div>
  `;
}

function toggleCheck(el){
  el.parentElement.classList.toggle('checked', el.checked);
}

// ══════════════════════════════════════
// FILTER
// ══════════════════════════════════════
const filterDefs = {
  type:{label:'이슈 타입', options:[{v:'epic',l:'Epic'},{v:'story',l:'Story'},{v:'task',l:'Task'},{v:'subtask',l:'Sub-task'},{v:'bug',l:'Bug'}]},
  status:{label:'상태', options:[{v:'todo',l:'할 일'},{v:'progress',l:'진행중'},{v:'review',l:'검토 요청'},{v:'done',l:'완료'},{v:'block',l:'블로킹'}]},
  priority:{label:'우선순위', options:[{v:'high',l:'높음'},{v:'normal',l:'보통'},{v:'low',l:'낮음'}]},
  assignee:{label:'담당자', options:[{v:'이상엽',l:'이상엽'},{v:'김길동',l:'김길동'},{v:'홍길동',l:'홍길동'},{v:'박길동',l:'박길동'}]},
  version:{label:'버전', options:[{v:'v8.3.0',l:'v8.3.0'},{v:'v8.4.0',l:'v8.4.0'},{v:'v8.5.0',l:'v8.5.0'}]},
};

// temp filter state while panel open
let tempFilter = {};

function toggleFilter(){
  const ov = document.getElementById('filterOverlay');
  const isOpen = ov.classList.contains('open');
  if(isOpen){ ov.classList.remove('open'); }
  else {
    tempFilter = JSON.parse(JSON.stringify(filterState));
    ov.classList.add('open');
    renderFilterPanel();
  }
}

function handleFilterOverlayClick(e){
  if(e.target === document.getElementById('filterOverlay')) toggleFilter();
}

function renderFilterPanel(){
  const tabsEl = document.getElementById('filterTabs');
  const optsEl = document.getElementById('filterOptions');
  tabsEl.innerHTML = Object.entries(filterDefs).map(([k,d])=>{
    const cnt = tempFilter[k]&&tempFilter[k].length ? `<span class="filter-tab-count">${tempFilter[k].length}</span>` : '';
    return `<div class="filter-tab${activeFilterTab===k?' active':''}" onclick="switchFilterTab('${k}')">${d.label}${cnt}</div>`;
  }).join('');
  renderFilterOptions(activeFilterTab, optsEl);
}

function switchFilterTab(key){
  activeFilterTab = key;
  renderFilterPanel();
}

function renderFilterOptions(key, el){
  const def = filterDefs[key];
  if(!tempFilter[key]) tempFilter[key]=[];
  el.innerHTML = def.options.map(o=>{
    const sel = tempFilter[key].includes(o.v) ? 'selected' : '';
    return `<span class="filter-option-chip ${sel}" onclick="toggleFilterOption('${key}','${o.v}')">${o.l}</span>`;
  }).join('');
}

function toggleFilterOption(key, val){
  if(!tempFilter[key]) tempFilter[key]=[];
  const idx = tempFilter[key].indexOf(val);
  if(idx>=0) tempFilter[key].splice(idx,1);
  else tempFilter[key].push(val);
  renderFilterPanel();
}

function resetFilters(){
  Object.keys(tempFilter).forEach(k=>tempFilter[k]=[]);
  renderFilterPanel();
}

function applyFilters(){
  Object.assign(filterState, JSON.parse(JSON.stringify(tempFilter)));
  toggleFilter();
  updateFilterCount();
  renderActiveChips();
  renderTable();
}

function updateFilterCount(){
  const total = Object.values(filterState).reduce((s,a)=>s+a.length,0);
  const fc = document.getElementById('filterCount');
  fc.textContent = total;
  fc.style.display = total ? 'flex' : 'none';
}

function renderActiveChips(){
  const el = document.getElementById('activeFilters');
  const chips = [];
  Object.entries(filterState).forEach(([k,vals])=>{
    vals.forEach(v=>{
      const lbl = filterDefs[k].options.find(o=>o.v===v)?.l || v;
      chips.push(`<span class="active-chip">${lbl}<span class="active-chip-x" onclick="removeChip('${k}','${v}')">✕</span></span>`);
    });
  });
  el.innerHTML = chips.join('');
}

function removeChip(key, val){
  const idx = filterState[key].indexOf(val);
  if(idx>=0) filterState[key].splice(idx,1);
  updateFilterCount();
  renderActiveChips();
  renderTable();
}

function doSearch(val){
  searchQuery = val;
  renderTable();
}

// ══════════════════════════════════════
// ISSUE CREATE MODAL
// ══════════════════════════════════════
function openCreateModal(){document.getElementById('createModal').classList.add('open');}
function closeCreateModal(){
  document.getElementById('createModal').classList.remove('open');
  document.getElementById('issueTitle').value='';
  document.getElementById('titleError').style.display='none';
  document.getElementById('createBtn').disabled=true;
}
function handleModalOverlayClick(e,id){if(e.target===document.getElementById(id)){if(id==='createModal')closeCreateModal();else if(id==='versionModal')closeVersionModal();}}
function updateCreateBtn(){
  const v = document.getElementById('issueTitle').value.trim();
  document.getElementById('createBtn').disabled = !v;
}
function createIssue(){
  const title = document.getElementById('issueTitle').value.trim();
  if(!title){document.getElementById('titleError').style.display='block';return;}
  const newIssue = {
    id:'prs-new-'+Date.now(), key:'PRS-'+(14+Math.floor(Math.random()*10)), type:document.getElementById('issueType').value,
    title, version:document.getElementById('issueVersion').value||'미배정',
    assignee:{name:document.getElementById('issueAssignee').options[document.getElementById('issueAssignee').selectedIndex].text,cls:'av-purple',initial:'이'},
    status:'todo', children:[]
  };
  ISSUES.push(newIssue);
  closeCreateModal();
  renderTable();
}

// ══════════════════════════════════════
// VERSION MODAL
// ══════════════════════════════════════
function openVersionModal(){
  versions = JSON.parse(JSON.stringify(VERSIONS));
  document.getElementById('versionModal').classList.add('open');
  renderVersionList();
}
function closeVersionModal(){document.getElementById('versionModal').classList.remove('open');}

function renderVersionList(){
  const el = document.getElementById('versionList');
  if(!versions.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#aeaeae;font-size:14px;">등록된 버전이 없습니다.</div>';return;}
  el.innerHTML = versions.map((v,i)=>`
    <div class="version-row" data-idx="${i}">
      <span class="version-name">v${v.name}</span>
      <select class="version-status-select ${vStatusCls[v.status]}" onchange="updateVersionStatus(${i},this.value)">
        <option value="scheduled"${v.status==='scheduled'?' selected':''}>예정</option>
        <option value="progress"${v.status==='progress'?' selected':''}>진행중</option>
        <option value="done"${v.status==='done'?' selected':''}>완료</option>
        <option value="wait"${v.status==='wait'?' selected':''}>대기</option>
        <option value="hold"${v.status==='hold'?' selected':''}>보류</option>
        <option value="cancel"${v.status==='cancel'?' selected':''}>취소</option>
      </select>
      <button class="delete-btn" ${v.issueCount>0?'disabled title="연결된 이슈가 있어 삭제할 수 없습니다."':''} onclick="confirmDeleteVersion(${i})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function updateVersionStatus(idx, val){
  versions[idx].status = val;
  const select = document.querySelector(`.version-row[data-idx="${idx}"] .version-status-select`);
  select.className = `version-status-select ${vStatusCls[val]}`;
}

function confirmDeleteVersion(idx){
  const v = versions[idx];
  openConfirm(`v${v.name} 버전을 삭제하시겠습니까?`, '삭제된 버전은 즉시 제거되며 복구할 수 없습니다.', ()=>{
    versions.splice(idx,1);
    renderVersionList();
  });
}

function updateVersionAddBtn(){
  const name = document.getElementById('newVersionName').value.trim();
  const status = document.getElementById('newVersionStatus').value;
  const valid = /^\d+(\.\d+)+$/.test(name);
  document.getElementById('addVersionBtn').disabled = !valid || !status;
}

function addVersion(){
  const name = document.getElementById('newVersionName').value.trim();
  const status = document.getElementById('newVersionStatus').value;
  const errEl = document.getElementById('versionAddError');
  if(!/^\d+(\.\d+)+$/.test(name)){
    errEl.textContent='숫자.숫자 형식으로 입력해 주세요.';errEl.style.display='block';return;
  }
  if(versions.find(v=>v.name===name)){
    errEl.textContent='이미 존재하는 버전입니다.';errEl.style.display='block';return;
  }
  errEl.style.display='none';
  versions.push({id:'v'+name.replace(/\./g,''),name,status,issueCount:0});
  document.getElementById('newVersionName').value='';
  document.getElementById('newVersionStatus').value='';
  document.getElementById('addVersionBtn').disabled=true;
  renderVersionList();
}

// ══════════════════════════════════════
// CONFIRM DIALOG
// ══════════════════════════════════════
function openConfirm(title, desc, onOk){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmDesc').textContent=desc;
  const btn = document.getElementById('confirmOkBtn');
  btn.onclick=()=>{onOk();closeConfirm();};
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
renderTable();
</script>
