<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRS — 홈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Pretendard,sans-serif;font-size:14px;line-height:20px;color:#343434;background:#f5f5f5;min-height:100vh;display:flex;}
svg{display:inline-block;vertical-align:middle;flex-shrink:0;}
button,a{font-family:inherit;cursor:pointer;}
a{text-decoration:none;color:inherit;}

/* ─── LNB ─── */
.lnb{width:220px;min-height:100vh;background:#fff;border-right:1px solid #dfdfdf;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;}
.lnb-inner{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
.lnb-global{padding:10px;border-bottom:1px solid #dfdfdf;}
.lnb-global-row{display:flex;align-items:center;height:48px;padding:0 8px;border-radius:8px;}
.lnb-logo{width:32px;height:32px;border-radius:8px;background:#6f64dd;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lnb-logo-letter{font-size:16px;font-weight:700;color:#fff;line-height:1;}
.lnb-global-name{font-size:15px;font-weight:600;color:#343434;margin-left:12px;flex:1;}
.lnb-global-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:#848484;position:relative;}
.lnb-global-icon:hover{background:#f5f5f5;}
.badge-dot{position:absolute;top:6px;right:6px;width:4px;height:4px;border-radius:50%;background:#f04040;}
.lnb-section{padding:8px 10px 4px;}
.lnb-item{display:flex;align-items:center;height:40px;padding:0 8px;border-radius:8px;cursor:pointer;color:#343434;gap:8px;font-size:14px;text-decoration:none;}
.lnb-item:hover{background:#f5f5f5;}
.lnb-item.active{background:#f0f0f0;font-weight:500;}
.lnb-item-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#848484;}
.lnb-divider{height:1px;background:#dfdfdf;margin:4px 10px;}
.lnb-project-header{display:flex;align-items:center;height:48px;padding:0 8px;margin:0 10px;border-radius:8px;cursor:pointer;gap:8px;}
.lnb-project-header:hover{background:#f5f5f5;}
.project-avatar-sm{width:32px;height:32px;border-radius:8px;background:#6f64dd;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.lnb-project-name{font-size:14px;font-weight:600;color:#343434;flex:1;}
.lnb-sub-items{padding:0 10px;}
.lnb-sub-item{display:flex;align-items:center;height:40px;padding:0 8px 0 16px;border-radius:8px;cursor:pointer;color:#343434;font-size:14px;gap:8px;text-decoration:none;}
.lnb-sub-item:hover{background:#f5f5f5;}
.lnb-sub-item.active{background:#f0f0f0;font-weight:500;}
.lnb-sub-item-icon{width:16px;height:16px;color:#848484;flex-shrink:0;}
.lnb-user{padding:12px 10px;border-top:1px solid #dfdfdf;display:flex;align-items:center;gap:8px;margin-top:auto;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:#6f64dd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:500;}
.user-email{font-size:11px;color:#848484;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-more{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#848484;border-radius:4px;cursor:pointer;}
.user-more:hover{background:#f5f5f5;}

/* ─── Content ─── */
.content-wrapper{margin-left:220px;flex:1;min-height:100vh;background:#f5f5f5;}
.content-inner{max-width:1200px;width:100%;margin:0 auto;padding:40px 40px 80px;}

/* ─── Page header ─── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.page-greeting{font-size:20px;font-weight:700;line-height:28px;}
.page-greeting span{color:#6f64dd;}
.header-right{display:flex;align-items:center;gap:10px;}

.search-wrap{position:relative;}
.search-wrap input{height:36px;width:280px;padding:0 12px 0 36px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;background:#fff;}
.search-wrap input:focus{border-color:#6f64dd;box-shadow:0 0 0 2px rgba(111,100,221,.12);}
.search-wrap input::placeholder{color:#aeaeae;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aeaeae;pointer-events:none;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:36px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;white-space:nowrap;}
.btn-ghost{background:#fff;border:1px solid #d2d2d2;color:#343434;box-shadow:0 1px 2px rgba(16,24,40,.06);}
.btn-ghost:hover{background:#f9f9f9;}
.btn-primary{background:#343434;border:1px solid #343434;color:#fff;box-shadow:0 1px 3px rgba(16,24,40,.10);}
.btn-primary:hover{background:#222;}
.btn-primary:disabled{background:#aeaeae;border-color:#aeaeae;cursor:not-allowed;}

/* ─── Section ─── */
.section{margin-bottom:40px;}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:600;line-height:24px;}
.section-count{font-size:13px;color:#aeaeae;font-weight:400;}

/* ─── Favorite Cards ─── */
.fav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.project-card{background:#fff;border:1px solid #dfdfdf;border-radius:12px;padding:20px;box-shadow:0 1px 2px rgba(16,24,40,.05);cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;}
.project-card:hover{box-shadow:0 4px 8px rgba(16,24,40,.10);border-color:#c8c8c8;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.project-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.project-card:hover .card-actions{opacity:1;}
.star-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;cursor:pointer;color:#aeaeae;}
.star-btn:hover{background:#f5f5f5;}
.star-btn.starred{color:#f5c342;}
.more-btn-sm{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:transparent;cursor:pointer;color:#aeaeae;}
.more-btn-sm:hover{background:#f5f5f5;}

.card-name{font-size:15px;font-weight:600;margin-bottom:4px;color:#343434;}
.card-desc{font-size:13px;color:#848484;line-height:20px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:16px;}
.card-meta{display:flex;align-items:center;gap:0;flex-wrap:wrap;row-gap:6px;}
.card-meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#848484;margin-right:12px;}
.meta-avatar{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
.av-purple{background:#6f64dd;}
.av-green{background:#2da44e;}
.av-orange{background:#e36f1e;}
.av-blue{background:#174fde;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0f0;}
.status-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;}
.s-progress{background:#e0eeff;color:#174fde;}
.s-todo{background:#f0f0f0;color:#848484;}
.s-done{background:#e6fef0;color:#077a36;}
.s-hold{background:#fffadb;color:#a07800;}
.update-time{font-size:12px;color:#aeaeae;}
.notif-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#f04040;font-weight:500;}

/* ─── Project List ─── */
.project-list{background:#fff;border:1px solid #dfdfdf;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.05);}
.list-head{display:grid;grid-template-columns:1fr 140px 100px 80px 100px 40px;gap:0;padding:0 20px;height:40px;background:#f9f9f9;border-bottom:1px solid #dfdfdf;align-items:center;}
.th{font-size:12px;font-weight:500;color:#848484;}
.project-row{display:grid;grid-template-columns:1fr 140px 100px 80px 100px 40px;gap:0;padding:0 20px;height:56px;align-items:center;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s;}
.project-row:last-child{border-bottom:none;}
.project-row:hover{background:#f9f9f9;}

.row-name-area{display:flex;align-items:center;gap:10px;min-width:0;}
.row-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.row-name-col{min-width:0;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-desc{font-size:12px;color:#848484;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-org{font-size:13px;color:#343434;}
.row-assignee{display:flex;align-items:center;gap:6px;font-size:13px;}
.row-status{}
.row-date{font-size:12px;color:#aeaeae;}
.row-star{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:#d2d2d2;}
.row-star:hover{color:#f5c342;}
.row-star.starred{color:#f5c342;}

/* ─── Empty state ─── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;color:#aeaeae;}
.empty-state svg{color:#d2d2d2;}
.empty-state p{font-size:14px;}
.empty-state small{font-size:12px;color:#d2d2d2;}

/* ═══ PROJECT CREATE MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:480px;display:flex;flex-direction:column;box-shadow:0 8px 24px rgba(16,24,40,.15);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #dfdfdf;}
.modal-title{font-size:16px;font-weight:600;}
.modal-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#848484;cursor:pointer;border:none;background:transparent;}
.modal-close:hover{background:#f5f5f5;}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:20px;}
.modal-footer{padding:16px 24px;border-top:1px solid #dfdfdf;display:flex;justify-content:flex-end;gap:8px;}

.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:13px;font-weight:500;color:#343434;}
.form-label .required{color:#f04040;margin-left:2px;}
.form-input{height:40px;padding:0 12px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;}
.form-input:focus{border-color:#6f64dd;box-shadow:0 0 0 2px rgba(111,100,221,.12);}
.form-input::placeholder{color:#aeaeae;}
.form-input.error{border-color:#f04040;}
.form-error{font-size:12px;color:#f04040;display:none;}
.form-select{height:40px;padding:0 10px;border:1px solid #d2d2d2;border-radius:8px;font-size:14px;font-family:inherit;color:#343434;outline:none;background:#fff;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23848484' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;}
.form-select:focus{border-color:#6f64dd;}
.form-hint{font-size:12px;color:#aeaeae;margin-top:2px;}

/* ─── Success toast ─── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#343434;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ════════ LNB ════════ -->
<nav class="lnb">
  <div class="lnb-inner">

    <!-- Global top -->
    <div class="lnb-global">
      <div class="lnb-global-row">
        <div class="lnb-logo">
          <span class="lnb-logo-letter">M</span>
        </div>
        <span class="lnb-global-name">PRS</span>
        <div class="lnb-global-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge-dot"></span>
        </div>
      </div>
    </div>

    <!-- Home -->
    <div class="lnb-section" style="padding-bottom:4px;">
      <a class="lnb-item active" href="prs-home.html">
        <span class="lnb-item-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        홈
      </a>
    </div>

    <div class="lnb-divider" style="margin:4px 10px;"></div>

    <!-- Project group -->
    <div style="padding:4px 0;">
      <div class="lnb-project-header">
        <div class="project-avatar-sm">P</div>
        <span class="lnb-project-name">PRS</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#848484" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <div class="lnb-sub-items">
        <a class="lnb-sub-item" href="project-home.html">
          <svg class="lnb-sub-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          프로젝트 홈
        </a>
        <a class="lnb-sub-item" href="#">
          <svg class="lnb-sub-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          기획 문서
        </a>
        <a class="lnb-sub-item" href="issue-list.html">
          <svg class="lnb-sub-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          이슈 목록
        </a>
        <a class="lnb-sub-item" href="#">
          <svg class="lnb-sub-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          </svg>
          프로젝트 설정
        </a>
      </div>
    </div>

  </div>

  <!-- User profile -->
  <div class="lnb-user">
    <div class="user-avatar">김</div>
    <div class="user-info">
      <div class="user-name">김승수</div>
      <div class="user-email">kss0610@midasit.com</div>
    </div>
    <div class="user-more">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
      </svg>
    </div>
  </div>
</nav>

<!-- ════ Content ════ -->
<main class="content-wrapper">
  <div class="content-inner">

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-greeting">안녕하세요, <span>김승수</span>님 👋</h1>
      <div class="header-right">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="프로젝트명, 조직, 담당자 검색..." oninput="doSearch(this.value)"/>
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          프로젝트 생성
        </button>
      </div>
    </div>

    <!-- 즐겨찾기 -->
    <div class="section" id="favSection">
      <div class="section-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#f5c342" stroke="#f5c342" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="section-title">즐겨찾기</span>
        <span class="section-count" id="favCount"></span>
      </div>
      <div class="fav-grid" id="favGrid"></div>
    </div>

    <!-- 전체 프로젝트 -->
    <div class="section">
      <div class="section-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#848484" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span class="section-title">전체 프로젝트</span>
        <span class="section-count" id="allCount"></span>
      </div>
      <div class="project-list">
        <div class="list-head">
          <div class="th">프로젝트</div>
          <div class="th">담당 조직</div>
          <div class="th">담당자</div>
          <div class="th">상태</div>
          <div class="th">최근 업데이트</div>
          <div class="th"></div>
        </div>
        <div id="projectListBody"></div>
      </div>
    </div>

  </div>
</main>

<!-- ════ 프로젝트 생성 모달 ════ -->
<div class="modal-overlay" id="createModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">프로젝트 생성</span>
      <button class="modal-close" onclick="closeCreateModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">프로젝트명<span class="required">*</span></label>
        <input class="form-input" id="projName" placeholder="예: PRS" maxlength="50" oninput="onNameInput()"/>
        <span class="form-error" id="nameError">프로젝트명을 입력해주세요.</span>
      </div>
      <div class="form-group">
        <label class="form-label">담당 조직</label>
        <select class="form-select" id="projOrg">
          <option value="" style="color:#aeaeae;">Project Team</option>
          <option value="inAX TF">inAX TF</option>
          <option value="HRP 개발팀">HRP 개발팀</option>
          <option value="플랫폼팀">플랫폼팀</option>
          <option value="Core팀">Core팀</option>
          <option value="데이터팀">데이터팀</option>
          <option value="디자인팀">디자인팀</option>
          <option value="QA팀">QA팀</option>
        </select>
        <span class="form-hint">선택하지 않으면 담당 조직 없음으로 저장됩니다.</span>
      </div>
      <div class="form-group">
        <label class="form-label">담당자</label>
        <select class="form-select" id="projAssignee">
          <option value="">비워두면 담당자 없음</option>
          <optgroup label="나">
            <option value="김승수">김승수 (나)</option>
          </optgroup>
          <optgroup label="팀원">
            <option value="이상엽">이상엽</option>
            <option value="김길동">김길동</option>
            <option value="홍길동">홍길동</option>
            <option value="박길동">박길동</option>
          </optgroup>
        </select>
        <span class="form-hint">담당자 미입력 시 '담당자 없음'으로 표시됩니다.</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCreateModal()">닫기</button>
      <button class="btn btn-primary" id="createBtn" disabled onclick="createProject()">완료</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════ DATA ══════════
const AVATAR_COLORS = {
  P:'#6f64dd', F:'#174fde', N:'#2da44e', i:'#e36f1e', D:'#c0251b', H:'#a07800'
};
const ASSIGNEE_CLS = {
  '이상엽':'av-purple','김길동':'av-green','홍길동':'av-orange','박길동':'av-blue','담당자 없음':''
};

let projects = [
  { id:1, initial:'P', name:'PRS', color:'#6f64dd',
    desc:'제품 히스토리와 기획 맥락을 연결하고, 기획 자동화로 상품성과 생산성을 향상 시키는 협업 플랫폼',
    org:'inAX TF', assignee:'이상엽', status:'progress', updated:'2시간 전', notif:3, starred:true, href:'project-home.html' },
  { id:2, initial:'F', name:'FRS', color:'#174fde',
    desc:'기능 요구사항 명세 자동화 및 개발-기획 싱크를 위한 협업 플랫폼',
    org:'HRP 개발팀', assignee:'김길동', status:'progress', updated:'1일 전', notif:1, starred:true, href:'#' },
  { id:3, initial:'N', name:'NRS 에이전트', color:'#2da44e',
    desc:'알림 및 에이전트 자동화 시스템 구축 프로젝트',
    org:'플랫폼팀', assignee:'홍길동', status:'todo', updated:'3일 전', notif:0, starred:false, href:'#' },
  { id:4, initial:'i', name:'inAX', color:'#e36f1e',
    desc:'inAX 플랫폼 전반의 품질 고도화 및 사용성 개선',
    org:'Core팀', assignee:'박길동', status:'done', updated:'1주 전', notif:0, starred:false, href:'#' },
  { id:5, initial:'D', name:'DRS', color:'#c0251b',
    desc:'데이터 요구사항 정의 및 파이프라인 자동화 관리 시스템',
    org:'데이터팀', assignee:'이상엽', status:'hold', updated:'2주 전', notif:0, starred:false, href:'#' },
  { id:6, initial:'H', name:'HRMS', color:'#a07800',
    desc:'인사 관리 시스템 리뉴얼 및 기능 확장 프로젝트',
    org:'HRP 개발팀', assignee:'담당자 없음', status:'todo', updated:'2026.03.10', notif:0, starred:false, href:'#' },
];

const STATUS_MAP = {
  progress:{cls:'s-progress',label:'진행중'},
  todo:{cls:'s-todo',label:'예정'},
  done:{cls:'s-done',label:'완료'},
  hold:{cls:'s-hold',label:'보류'},
};

let searchQuery = '';

// ══════════ RENDER ══════════
function render(){
  const q = searchQuery.toLowerCase();
  const filtered = !q ? projects : projects.filter(p=>
    p.name.toLowerCase().includes(q) ||
    p.org.toLowerCase().includes(q) ||
    p.assignee.toLowerCase().includes(q)
  );

  const favs = filtered.filter(p=>p.starred);
  const all  = filtered;

  // Fav section visibility
  const favSection = document.getElementById('favSection');
  favSection.style.display = favs.length ? 'block' : 'none';

  // Fav count
  document.getElementById('favCount').textContent = favs.length ? `${favs.length}개` : '';

  // All count
  document.getElementById('allCount').textContent = `${all.length}개`;

  // Fav grid
  document.getElementById('favGrid').innerHTML = favs.map(p=>cardHTML(p)).join('');

  // List
  const body = document.getElementById('projectListBody');
  if(!all.length){
    body.innerHTML=`<div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>검색 결과가 없습니다.</p>
      <small>다른 키워드로 검색해 보세요.</small>
    </div>`;
  } else {
    body.innerHTML = all.map(p=>rowHTML(p)).join('');
  }
}

function cardHTML(p){
  const s = STATUS_MAP[p.status];
  const avatarCls = ASSIGNEE_CLS[p.assignee]||'av-purple';
  const initial   = p.assignee!=='담당자 없음' ? p.assignee[0] : '—';
  return `
  <div class="project-card" onclick="goProject('${p.href}')">
    <div class="card-top">
      <div class="project-avatar" style="background:${p.color}">${p.initial}</div>
      <div class="card-actions">
        <button class="star-btn starred" onclick="toggleStar(event,${p.id})" title="즐겨찾기 해제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="more-btn-sm" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        </button>
      </div>
    </div>
    <div class="card-name">${p.name}</div>
    <div class="card-desc">${p.desc}</div>
    <div class="card-meta">
      <div class="card-meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        ${p.org}
      </div>
      ${p.assignee!=='담당자 없음' ? `
      <div class="card-meta-item">
        <div class="meta-avatar ${avatarCls}">${initial}</div>
        ${p.assignee}
      </div>` : `<div class="card-meta-item" style="color:#aeaeae;">담당자 없음</div>`}
    </div>
    <div class="card-footer">
      <span class="status-badge ${s.cls}">${s.label}</span>
      <div style="display:flex;align-items:center;gap:10px;">
        ${p.notif>0?`<span class="notif-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>${p.notif}</span>`:''}
        <span class="update-time">${p.updated}</span>
      </div>
    </div>
  </div>`;
}

function rowHTML(p){
  const s = STATUS_MAP[p.status];
  const avatarCls = ASSIGNEE_CLS[p.assignee]||'av-purple';
  const initial   = p.assignee!=='담당자 없음' ? p.assignee[0] : '';
  return `
  <div class="project-row" onclick="goProject('${p.href}')">
    <div class="row-name-area">
      <div class="row-avatar" style="background:${p.color}">${p.initial}</div>
      <div class="row-name-col">
        <div class="row-name">${p.name}</div>
        <div class="row-desc">${p.desc}</div>
      </div>
    </div>
    <div class="row-org">${p.org}</div>
    <div class="row-assignee">
      ${p.assignee!=='담당자 없음'
        ?`<div class="meta-avatar ${avatarCls}" style="width:20px;height:20px;font-size:9px;">${initial}</div>${p.assignee}`
        :`<span style="color:#aeaeae;font-size:13px;">없음</span>`}
    </div>
    <div><span class="status-badge ${s.cls}">${s.label}</span></div>
    <div class="row-date">${p.updated}</div>
    <div class="row-star${p.starred?' starred':''}" onclick="toggleStar(event,${p.id})" title="${p.starred?'즐겨찾기 해제':'즐겨찾기'}">
      <svg width="14" height="14" viewBox="0 0 24 24" ${p.starred?'fill="#f5c342" stroke="#f5c342"':'fill="none" stroke="currentColor"'} stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
  </div>`;
}

function goProject(href){ if(href && href!=='#') window.location.href=href; }

function toggleStar(e, id){
  e.stopPropagation();
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  const favCount = projects.filter(x=>x.starred).length;
  if(!p.starred && favCount>=3){ showToast('즐겨찾기는 최대 3개까지 가능합니다.'); return; }
  p.starred = !p.starred;
  render();
}

function doSearch(v){ searchQuery=v; render(); }

// ══════════ MODAL ══════════
function openCreateModal(){document.getElementById('createModal').classList.add('open');}
function closeCreateModal(){
  document.getElementById('createModal').classList.remove('open');
  document.getElementById('projName').value='';
  document.getElementById('projOrg').value='';
  document.getElementById('projAssignee').value='';
  document.getElementById('nameError').style.display='none';
  document.getElementById('projName').classList.remove('error');
  document.getElementById('createBtn').disabled=true;
}
function handleOverlayClick(e){ if(e.target===document.getElementById('createModal')) closeCreateModal(); }
function onNameInput(){
  const v=document.getElementById('projName').value.trim();
  document.getElementById('createBtn').disabled=!v;
  if(v){ document.getElementById('nameError').style.display='none'; document.getElementById('projName').classList.remove('error'); }
}
function createProject(){
  const name=document.getElementById('projName').value.trim();
  if(!name){ document.getElementById('nameError').style.display='block'; document.getElementById('projName').classList.add('error'); return; }

  // duplicate check
  if(projects.find(p=>p.name.toLowerCase()===name.toLowerCase())){
    document.getElementById('nameError').textContent='이미 존재하는 프로젝트명입니다.';
    document.getElementById('nameError').style.display='block';
    document.getElementById('projName').classList.add('error');
    return;
  }

  const org=document.getElementById('projOrg').value||'담당 조직 없음';
  const assignee=document.getElementById('projAssignee').value||'담당자 없음';
  const colors=['#6f64dd','#174fde','#2da44e','#e36f1e','#c0251b','#a07800','#343434'];
  const color=colors[projects.length%colors.length];
  const initial=name[0].toUpperCase();

  projects.unshift({
    id: Date.now(), initial, name, color,
    desc:'새로 생성된 프로젝트입니다.',
    org, assignee, status:'todo', updated:'방금 전', notif:0, starred:false, href:'#'
  });
  closeCreateModal();
  render();
  showToast(`'${name}' 프로젝트가 생성되었습니다.`);
}

// ══════════ TOAST ══════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════ INIT ══════════
render();
</script>
</body>
</html>
