<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRS - 기획 문서</title>
  <!-- v2.1.0 | Figma 기획문서 완전 재현 (299-5372 / 322-5820 / 340-8814) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ── */
    :root {
      --font: 'Pretendard', sans-serif;
      --white: #ffffff;
      --gray-25: #f5f5f5; --gray-50: #f0f0f0; --gray-100: #eaeaea;
      --gray-200: #dfdfdf; --gray-300: #d2d2d2; --gray-400: #aeaeae;
      --gray-500: #848484; --gray-600: #474747; --gray-700: #343434; --gray-800: #191919;
      --violet-25: #f2f1fe; --violet-50: #dfdcfd;
      --violet-400: #6f64dd; --violet-500: #6358d5; --violet-600: #574ccd;
      --blue-25: #eef5fb; --blue-50: #e0eeff;
      --blue-400: #376cf2; --blue-500: #1e5af0; --blue-600: #174fde;
      --green-25: #e6fef0; --green-700: #077a36;
      --yellow-25: #fffadb; --yellow-700: #a07800;
      --red-25: #fff5f5; --red-500: #fd493f;
      --shadow-0: 0 1px 2px rgba(16,24,40,.05);
      --shadow-1: 0 1px 3px rgba(16,24,40,.10), 0 1px 2px rgba(16,24,40,.06);
      --shadow-2: 0 4px 8px rgba(16,24,40,.10), 0 2px 4px rgba(16,24,40,.06);
      --shadow-3: 0 12px 16px rgba(16,24,40,.08), 0 4px 6px rgba(16,24,40,.03);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); font-size: 14px; line-height: 20px;
      color: var(--gray-700); background: var(--gray-25);
      display: flex; height: 100vh; overflow: hidden; }
    svg { display: inline-block; vertical-align: middle; }
    button { font-family: var(--font); cursor: pointer; }
    a { text-decoration: none; }

    /* ══ LNB ══ */
    .lnb { width: 220px; min-width: 220px; background: var(--white);
      border-right: 1px solid var(--gray-200);
      display: flex; flex-direction: column; height: 100vh; overflow-y: auto; flex-shrink: 0; }

    /* ══ MAIN ══ */
    .main { flex: 1; display: flex; overflow: hidden; position: relative;
      background: #f5f5f5; /* $semantic-color-background-sunken */ }

    /* ── Empty State ── */
    #emptyState { flex: 1; display: flex; align-items: center; justify-content: center;
      background: #f5f5f5; /* $semantic-color-background-sunken — 콘텐츠 영역 기본 배경 */ }
    .empty-wrap { display: flex; flex-direction: column; align-items: center;
      gap: 20px; text-align: center; max-width: 420px; padding: 60px 40px; }
    .empty-icon { width: 72px; height: 72px; opacity: .35; }
    .empty-title { font-size: 16px; font-weight: 600; line-height: 26px; color: var(--gray-700); }
    .empty-sub { font-size: 13px; line-height: 20px; color: var(--gray-400); }
    .btn-primary-ai {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px; border-radius: 8px; /* $base-dimen-radius-100 */
      background: var(--violet-400); /* $base-color-accent-violet-400 #6f64dd */
      color: var(--white); font-size: 14px; font-weight: 600; border: none;
      cursor: pointer; transition: background .12s; }
    .btn-primary-ai:hover { background: var(--violet-500); }

    /* ── Node View ── */
    #nodeView { flex: 1; display: none; position: relative; overflow: hidden; }

    /* Mini Toolbar — components.md §33 */
    .mini-toolbar { position: absolute; left: 12px; top: 12px; z-index: 10;
      display: flex; flex-direction: column; gap: 2px;
      background: var(--white); border-radius: 8px; box-shadow: var(--shadow-1); padding: 4px; }
    .mt-btn { width: 32px; height: 32px; border-radius: 6px; border: none;
      background: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: var(--gray-400); transition: background .12s, color .12s; }
    .mt-btn:hover { background: var(--gray-25); color: var(--gray-700); }
    .mt-btn.active { background: var(--violet-25); color: var(--violet-500); }

    /* Canvas — components.md §32 */
    .canvas-wrap { width: 100%; height: 100%; overflow: auto;
      background-color: var(--gray-50); /* $base-color-neutral-coolgray-50 #f0f0f0 */
      background-image: radial-gradient(circle, var(--gray-200) 1px, transparent 1px);
      /* $base-color-neutral-coolgray-200 #dfdfdf */
      background-size: 24px 24px; }
    .canvas-inner { position: relative; }
    .conn-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }

    /* Node Card — components.md §30 */
    .node-card { position: absolute; display: flex; align-items: center; gap: 7px;
      padding: 0 10px; border-radius: 10px; border: 1px solid var(--gray-300);
      background: var(--white); cursor: pointer; user-select: none;
      box-shadow: var(--shadow-0); transition: border-color .15s, box-shadow .15s; }
    .node-card:hover { border-color: var(--violet-400); box-shadow: var(--shadow-1); }
    .node-card:hover .nc-add { opacity: 1; }
    .node-card.selected {
      border-color: var(--violet-400);
      box-shadow: 0 0 0 3px var(--violet-25), var(--shadow-1); }

    /* Root node */
    .node-card.root {
      background: var(--violet-400); /* $base-color-accent-violet-400 */
      border-color: var(--violet-400); border-radius: 12px;
      padding: 0 14px; gap: 10px; }
    .root-badge { width: 28px; height: 28px; border-radius: 7px;
      background: rgba(255,255,255,0.2); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700;
      color: var(--white); flex-shrink: 0; }
    .node-card.root .nc-label { color: var(--white); font-size: 15px; font-weight: 600; }
    .node-card.root .nc-add { border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15); color: var(--white); opacity: 1; }
    .node-card.root .nc-add:hover { background: rgba(255,255,255,0.3); }

    /* Node icon */
    .nc-icon { width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .nc-label { font-size: 13px; font-weight: 500; color: var(--gray-700);
      white-space: nowrap; flex: 1; }
    .nc-star { display: flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; color: var(--gray-300); flex-shrink: 0;
      opacity: 0; transition: opacity .12s; }
    .node-card:hover .nc-star { opacity: 1; }
    .nc-star.starred { opacity: 1 !important; color: var(--blue-400); }
    .nc-add { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--gray-300);
      background: var(--white); display: flex; align-items: center; justify-content: center;
      color: var(--gray-500); opacity: 0; flex-shrink: 0; transition: opacity .15s; }
    .nc-add:hover { background: var(--violet-25); border-color: var(--violet-400); color: var(--violet-400); }

    /* ── Detail Panel ── */
    .detail-panel { position: absolute; top: 0; right: -580px; width: 580px; height: 100%;
      background: var(--white); border-left: 1px solid var(--gray-200);
      box-shadow: var(--shadow-3); display: flex; flex-direction: column;
      z-index: 100; transition: right .28s cubic-bezier(.25,.46,.45,.94); }
    .detail-panel.open { right: 0; }

    /* Panel header */
    .panel-head { padding: 20px 24px 0; flex-shrink: 0; }
    .panel-breadcrumb { font-size: 11px; color: var(--gray-400);
      display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
    .panel-title { font-size: 18px; font-weight: 600; color: var(--gray-800);
      line-height: 28px; } /* Title3 */
    .panel-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center;
      justify-content: flex-end; }
    .btn-ghost-sm { display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: var(--white); border: 1px solid var(--gray-300); color: var(--gray-700);
      cursor: pointer; transition: background .12s; }
    .btn-ghost-sm:hover { background: var(--gray-25); }
    .btn-primary-sm { display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: var(--violet-400); color: var(--white); border: none;
      cursor: pointer; transition: background .12s; }
    .btn-primary-sm:hover { background: var(--violet-500); }
    .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--gray-200);
      background: var(--white); display: flex; align-items: center; justify-content: center;
      color: var(--gray-500); cursor: pointer; }
    .btn-icon:hover { background: var(--gray-25); }

    /* Step nav — components.md §34 */
    .step-nav { display: flex; align-items: center; gap: 4px;
      padding: 12px 24px; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
    .step-item { display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 8px; border: none; background: none;
      cursor: pointer; transition: background .12s; }
    .step-item:hover { background: var(--gray-25); }
    .step-num { width: 20px; height: 20px; border-radius: 50%;
      background: var(--gray-200); color: var(--gray-500); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .2s, color .2s; }
    .step-label { font-size: 13px; font-weight: 500; color: var(--gray-400);
      white-space: nowrap; transition: color .2s; }
    .step-item.active .step-num { background: var(--violet-400); color: var(--white); }
    .step-item.active .step-label { color: var(--violet-400); font-weight: 600; }
    .step-item.done .step-num { background: #08bf52; color: var(--white); }
    .step-item.done .step-label { color: var(--green-700); }
    .step-sep { color: var(--gray-300); font-size: 12px; }

    /* Panel content */
    .panel-content { flex: 1; overflow-y: auto; padding: 24px; }
    .doc-section { margin-bottom: 24px; }
    .doc-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--gray-400); margin-bottom: 10px; }
    .doc-section-text { font-size: 14px; line-height: 24px; color: var(--gray-700); }
    .doc-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .doc-meta-box { background: var(--gray-25); border-radius: 8px; padding: 12px 14px; }
    .doc-meta-label { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
    .doc-meta-val { font-size: 13px; font-weight: 600; color: var(--gray-800); }
    .status-badge { display: inline-flex; align-items: center; padding: 3px 8px;
      border-radius: 4px; font-size: 12px; font-weight: 600; }
    .s-inprogress { background: var(--blue-50); color: var(--blue-600); }
    .s-todo       { background: var(--gray-50); color: var(--gray-500); }
    .s-done       { background: var(--green-25); color: var(--green-700); }
    .s-review     { background: var(--yellow-25); color: var(--yellow-700); }
    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .doc-list li { display: flex; align-items: flex-start; gap: 8px;
      font-size: 14px; line-height: 22px; color: var(--gray-700); }
    .doc-list li::before { content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--violet-400); margin-top: 9px; flex-shrink: 0; }
    .doc-divider { border: none; border-top: 1px solid var(--gray-200); margin: 20px 0; }

    /* Placeholder pane */
    .placeholder-pane { display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 260px; gap: 12px;
      color: var(--gray-400); text-align: center; }
    .placeholder-pane p { font-size: 13px; }
  </style>
</head>
<body>

<!-- LNB -->
<aside class="lnb" id="lnb-root"></aside>

<!-- ══ MAIN ══ -->
<main class="main">

  <!-- ① Empty State — components.md §27 -->
  <div id="emptyState">
    <div class="empty-wrap">
      <!-- Folder illustration -->
      <svg class="empty-icon" viewBox="0 0 72 72" fill="none">
        <rect x="4" y="22" width="64" height="42" rx="5" fill="#d2d2d2"/>
        <rect x="4" y="28" width="64" height="36" rx="5" fill="#dfdfdf"/>

  </div>

  <!-- ② Node View — components.md §30~33 -->
  <div id="nodeView">

    <!-- Canvas Mini Toolbar — components.md §33 -->
    <div class="mini-toolbar">
      <button class="mt-btn active" title="노드뷰">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>
          <rect x="6" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>

      </button>

      </button>
      <button class="mt-btn" title="즐겨찾기">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2l1.6 3.6 3.9.4-2.9 2.7 1 3.8L8 10.5 4.4 12.5l1-3.8L2.5 6l3.9-.4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-inner" id="canvasInner">
        <svg class="conn-svg" id="connSvg"></svg>
        <!-- Node cards rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ③ Detail Panel (slide-in) -->
  <div class="detail-panel" id="detailPanel">

    <div class="panel-head">
      <div class="panel-breadcrumb">
        <span>PRS</span>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>

      </div>

          <button class="btn-ghost-sm" onclick="enterEdit()">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M9.5 1.5a1 1 0 011.4 1.4L3.6 10H2.5v-1.1L9.5 1.5zM1 12h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            편집

        <div class="doc-section">
          <div class="doc-section-label">핵심 기능</div>
          <ul class="doc-list" id="docFeats"></ul>
        </div>
      </div>
      <!-- Step 1: 사용자 플로우 -->
      <div id="pane1" style="display:none;">
        <div class="placeholder-pane">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">

    </div>

</main>

<script>
/* ── Node Data (Figma 322-5820 기준 PRS IA 구조) ── */
const NODES = [
  { id:'root',     type:'root', label:'PRS',            x:280, y:397, w:190, h:44 },
  /* L1 */
  { id:'home',     type:'l1',   label:'홈',             x:530, y:87,  w:175, h:40, icon:'home',     iconBg:'#f2f1fe', iconColor:'#6f64dd' },
  { id:'proj',     type:'l1',   label:'프로젝트 홈',    x:530, y:247, w:175, h:40, icon:'folder',   iconBg:'#e0eeff', iconColor:'#174fde' },

function getNode(id) { return NODES.find(n => n.id === id); }

/* ── Icon SVGs ── */
function iconSVG(type, color) {
  const c = color || '#848484';
  const icons = {
    home: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L12.5 5.5V13H9.5V9H4.5V13H1.5V5.5L7 1Z" stroke="${c}" stroke-width="1.3" stroke-linejoin="round"/></svg>`,
    folder: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3.5C1 2.67 1.67 2 2.5 2H5L6.5 3.5H11.5C12.33 3.5 13 4.17 13 5V10.5C13 11.33 12.33 12 11.5 12H2.5C1.67 12 1 11.33 1 10.5V3.5Z" stroke="${c}" stroke-width="1.3"/></svg>`,
    document: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1h5.5L11 3.5V13H3V1Z" stroke="${c}" stroke-width="1.3"/><path d="M8.5 1v3H11" stroke="${c}" stroke-width="1.3" stroke-linecap="round"/><path d="M5 6h4M5 8.5h3" stroke="${c}" stroke-width="1.3" stroke-linecap="round"/></svg>`,
    check: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="${c}" stroke-width="1.3"/><path d="M4 7l2 2 4-4" stroke="${c}" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    settings: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2" stroke="${c}" stroke-width="1.3"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" stroke="${c}" stroke-width="1.3" stroke-linecap="round"/></svg>`,
  };
  return icons[type] || '';
}

function starOutline() {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5l1.5 3.3 3.6.4-2.6 2.5.8 3.5L7 9.5l-3.3 1.7.8-3.5L2 5.2l3.6-.4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`;
}

function starFilled(color) {
  return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5l1.5 3.3 3.6.4-2.6 2.5.8 3.5L7 9.5l-3.3 1.7.8-3.5L2 5.2l3.6-.4z" fill="${color||'#376cf2'}" stroke="${color||'#376cf2'}" stroke-width="1.2" stroke-linejoin="round"/></svg>`;
}

function plusSVG() {
  return `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

/* ── Bezier path ── */
function bPath(n1, n2) {
  const x1 = n1.x + n1.w, y1 = n1.y + n1.h / 2;
  const x2 = n2.x,         y2 = n2.y + n2.h / 2;
  const dx = (x2 - x1) * 0.55;
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

/* ── Render canvas ── */
function renderCanvas() {
  const inner = document.getElementById('canvasInner');
  const svg   = document.getElementById('connSvg');

  // Size
  let maxX = 0, maxY = 0;
  NODES.forEach(n => { maxX = Math.max(maxX, n.x+n.w+80); maxY = Math.max(maxY, n.y+n.h+80); });
  inner.style.width  = maxX + 'px';
  inner.style.height = maxY + 'px';
  svg.setAttribute('width', maxX); svg.setAttribute('height', maxY);
  svg.setAttribute('viewBox', `0 0 ${maxX} ${maxY}`);

  // Edges
  EDGES.forEach(([fromId, toId]) => {
    const n1 = getNode(fromId), n2 = getNode(toId);
    if (!n1 || !n2) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', bPath(n1, n2));
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#dfdfdf'); /* $semantic-color-divider-default */
    path.setAttribute('stroke-width', '1.5');
    svg.appendChild(path);
  });

  // Nodes
  NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = `node-card ${n.type}`;
    div.id = 'nc-' + n.id;
    div.style.cssText = `left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px;`;

    if (n.type === 'root') {
      div.innerHTML = `<div class="root-badge">P</div>
        <span class="nc-label">PRS</span>
        <button class="nc-add" onclick="event.stopPropagation()" title="하위 추가">${plusSVG()}</button>`;
    } else {
      const iconHTML = n.icon
        ? `<div class="nc-icon" style="background:${n.iconBg||'var(--gray-50)'}">${iconSVG(n.icon, n.iconColor)}</div>`
        : '';
      const starHTML = n.starred
        ? `<span class="nc-star starred">${starFilled('#376cf2')}</span>`
        : `<span class="nc-star">${starOutline()}</span>`;
      div.innerHTML = `${iconHTML}
        <span class="nc-label">${n.label}</span>
        ${starHTML}
        <button class="nc-add" onclick="event.stopPropagation()" title="하위 추가">${plusSVG()}</button>`;
    }

    div.addEventListener('click', () => openPanel(n));
    inner.appendChild(div);
  });
}

/* ── Show canvas ── */
function showCanvas() {
  document.getElementById('emptyState').style.display = 'none';
  const nv = document.getElementById('nodeView');
  nv.style.display = 'flex';
  nv.style.flexDirection = 'column';
  renderCanvas();
}

/* ── Open panel ── */
let currentId = null;
function openPanel(node) {
  if (currentId) {
    const prev = document.getElementById('nc-' + currentId);
    if (prev) prev.classList.remove('selected');
  }
  currentId = node.id;
  document.getElementById('nc-' + node.id).classList.add('selected');

  const parent = NODES.find(n => n.id === node.parent);
  document.getElementById('panelParent').textContent = parent ? parent.label : 'PRS';
  document.getElementById('panelTitle').textContent = node.label;

  const d = FEATURE_DATA[node.id];
  if (d) {
    document.getElementById('docStatus').innerHTML = `<span class="status-badge ${statusCls(d.status)}">${d.slabel}</span>`;
    document.getElementById('docUsers').textContent = d.users;
    document.getElementById('docDesc').textContent = d.desc;
    document.getElementById('docFeats').innerHTML = d.feats.map(f => `<li>${f}</li>`).join('');
  } else {
    document.getElementById('docStatus').innerHTML = `<span class="status-badge s-todo">미착수</span>`;
    document.getElementById('docUsers').textContent = '—';
    document.getElementById('docDesc').textContent = `${node.label} 기능 상세 문서를 작성하세요.`;
    document.getElementById('docFeats').innerHTML = '';
  }

  document.getElementById('detailPanel').classList.add('open');
  switchStep(0);
}

function statusCls(s) {
  return { done:'s-done', inprogress:'s-inprogress', planning:'s-review', todo:'s-todo' }[s] || 's-todo';
}

/* ── Close panel ── */
function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  if (currentId) {
    const el = document.getElementById('nc-' + currentId);
    if (el) el.classList.remove('selected');
    currentId = null;
  }
}

/* ── Switch step ── */
function switchStep(idx) {
  for (let i = 0; i < 3; i++) {
    const item = document.getElementById('sn' + i);
    const circ = document.getElementById('snc' + i);
    item.classList.remove('active', 'done');
    circ.textContent = i < idx ? '✓' : (i + 1);
    if (i < idx) item.classList.add('done');
    if (i === idx) item.classList.add('active');
    document.getElementById('pane' + i).style.display = i === idx ? 'block' : 'none';
  }
}

/* ── Edit mode (stub) ── */
function enterEdit() { alert('편집 모드: AI 어시스턴트와 함께 수정합니다.'); }

/* ── Close on backdrop ── */
document.addEventListener('click', e => {
  const panel = document.getElementById('detailPanel');
  if (!panel.classList.contains('open')) return;
  if (panel.contains(e.target)) return;
  if (e.target.closest('.node-card')) return;
  closePanel();
});

<script>
function setDocsState(state, btn) {
  document.querySelectorAll('.ps-btn2').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');

  const empty  = document.getElementById('emptyState');
  const canvas = document.getElementById('nodeView');
  const skel   = document.getElementById('skelCanvas');
  const error  = document.getElementById('errorDocs');

  empty.style.display = 'none'; canvas.style.display = 'none';
  skel.style.display = 'none';  error.classList.remove('show');

  if (state === 'default') {
    // 현재 상태 유지 (캔버스가 열려있으면 캔버스, 아니면 빈 상태)
    if (document.getElementById('canvasInner').children.length > 1) {
      canvas.style.display = 'flex'; canvas.style.flexDirection = 'column';
    } else {
      empty.style.display = 'flex';
    }
  } else if (state === 'loading') {
    skel.style.display = 'flex';
  } else if (state === 'empty') {
    empty.style.display = 'flex';
  } else if (state === 'error') {
    error.classList.add('show');
  }
}
</script>
