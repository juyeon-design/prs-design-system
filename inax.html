<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>inAX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b0b0b;height:100vh;display:flex;overflow:hidden}
:root{--ax:#2B5BE8;--prs:#6B63D4;--frs:#22A84A;--brs:#F26A1B;--nrs:#2F6FE8;--hrs:#F03C6E;--accent:#2B5BE8}

/* Window */
.window{display:flex;flex-direction:column;width:100vw;height:100vh}
.titlebar{height:44px;background:#fff;border-bottom:1px solid #eaeaea;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.tl{display:flex;gap:6px}
.tlb{width:12px;height:12px;border-radius:50%}
.tab-bar{display:flex;gap:2px;margin-left:12px;align-items:center}
.tab{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:8px;font-size:13px;color:#666;cursor:pointer;white-space:nowrap}
.tab.active{background:#f0f0f8;color:#111;font-weight:500}
.tab-x{color:#bbb;font-size:15px;line-height:1;margin-left:2px}
.tab-add{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:#aaa;border-radius:6px;cursor:pointer;font-size:18px;line-height:1}
.tab-add:hover{background:#f0f0f5}

/* App */
.app{display:flex;flex:1;overflow:hidden}

/* Icon rail */
.rail{width:68px;background:#0b0b0b;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:1px;flex-shrink:0}
.brand{width:36px;height:36px;margin-bottom:12px;cursor:pointer}
.ri{width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:7px 4px;border-radius:10px;cursor:pointer;position:relative;transition:color .15s,background .15s;color:rgba(255,255,255,.42)}
.ri:hover:not(.active){color:rgba(255,255,255,.7);background:rgba(255,255,255,.06)}
.ri.active{color:var(--accent);background:rgba(255,255,255,.1)}
.ri-lbl{font-size:10px;font-weight:500;color:inherit;letter-spacing:-.01em;white-space:nowrap}
.rdiv{width:30px;height:1px;background:rgba(255,255,255,.1);margin:5px 0}
.rbottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px}
.av{width:30px;height:30px;border-radius:50%;background:#2ecc71;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.nbadge{position:absolute;top:3px;right:6px;width:15px;height:15px;background:#ef4444;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #0b0b0b}

/* Sub nav */
.snav{width:196px;background:#fff;border-right:1px solid #eaeaea;display:flex;flex-direction:column;padding:16px 0;flex-shrink:0;overflow-y:auto}
.snav-hdr{padding:8px 16px 14px;font-size:15px;font-weight:700;color:#111}
.snav-sec{font-size:11px;font-weight:600;color:#aaa;padding:14px 16px 5px;letter-spacing:.06em;text-transform:uppercase}
.snav-item{padding:8px 16px;font-size:13.5px;color:#555;cursor:pointer;display:flex;align-items:center;gap:8px;position:relative;transition:background .12s}
.snav-item:hover{background:#f6f6f6}
.snav-item.active{background:#f0f0f8;color:#111;font-weight:500}
.snav-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.sbadge{background:#2F6FE8;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f6f6fb}
.chdr{padding:24px 32px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ctitle{font-size:22px;font-weight:700;color:#111}
.hacts{display:flex;gap:8px;align-items:center}
.cbody{flex:1;padding:20px 32px;overflow-y:auto}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{filter:brightness(.93)}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:#fff;color:#374151;border:1.5px solid #d1d5db}
.btn-s:hover{background:#f9fafb}
.btn-g{background:transparent;color:#555}
.btn-g:hover{background:#ebebf0}

/* Search */
.sbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px}
.sbar input{border:none;outline:none;font-size:13px;color:#111;background:transparent;width:100%}
.sbar input::placeholder{color:#bbb}

/* Page tabs */
.ptabs{display:flex;border-bottom:1px solid #eaeaea;padding:0 32px;margin-top:10px;flex-shrink:0}
.ptab{font-size:13.5px;font-weight:500;color:#848484;padding:10px 0;margin-right:24px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Filter */
.fbar{display:flex;gap:8px;padding:14px 32px 0;align-items:center;flex-wrap:wrap;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;color:#555}
.chip.on{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,#fff)}

/* KPI */
.kgrid{display:grid;gap:14px;margin-bottom:20px}
.kcard{background:#fff;border-radius:12px;padding:20px;border:1px solid #eaeaea}
.klbl{font-size:12px;color:#848484;font-weight:500;margin-bottom:8px}
.kval{font-size:28px;font-weight:700;color:#111}
.ksub{font-size:12px;color:#848484;margin-top:4px}
.kup{font-size:12px;font-weight:500;color:#10b981}
.kdn{font-size:12px;font-weight:500;color:#ef4444}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:12px;font-weight:600;color:#848484;text-align:left;padding:10px 16px;border-bottom:1px solid #eaeaea;white-space:nowrap}
.tbl td{font-size:13px;color:#374151;padding:11px 16px;border-bottom:1px solid #f6f6f6}
.tbl tr:hover td{background:#fafafa}
.grow td{background:#f9fafb!important;font-weight:600;font-size:12px;color:#555}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:500}

/* Kanban */
.kban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kcol{background:#f0f0f8;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:480px}
.chead{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.cdot{width:8px;height:8px;border-radius:50%}
.ctit{font-size:13px;font-weight:600;color:#374151}
.ccnt{font-size:12px;color:#9ca3af}
.tcard{background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb;cursor:pointer;transition:box-shadow .15s}
.tcard:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.tcard.od{border-color:#fca5a5;border-width:1.5px}
.tname{font-size:13.5px;font-weight:500;color:#111;margin-bottom:5px}
.tmeta{font-size:12px;color:#9ca3af;line-height:1.5}
.tdue{font-size:11.5px;font-weight:500}
.ekcol{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#ccc;font-size:13px;padding:40px 0;flex:1}

/* Chart */
.chart-wrap{background:#fff;border-radius:12px;border:1px solid #eaeaea;padding:20px}
.chart-ttl{font-size:14px;font-weight:600;color:#111;margin-bottom:12px}
.bars{display:flex;align-items:flex-end;gap:8px;height:160px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar{border-radius:4px 4px 0 0}
.blbl{font-size:11px;color:#848484}

/* Section grid */
.sgrid{display:grid;gap:14px}

/* List */
.li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f6f6f6}
.li:last-child{border:none}

/* Progress */
.pbar{height:6px;background:#f0f0f5;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px}

/* Empty */
.estate{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:60%;color:#ccc}
.estate h3{font-size:15px;font-weight:600;color:#555}
.estate p{font-size:13px;text-align:center;max-width:280px;line-height:1.6;color:#848484}

/* Card box */
.cbox{background:#fff;border-radius:12px;border:1px solid #eaeaea;overflow:hidden}
.cbox-h{padding:14px 20px;border-bottom:1px solid #eaeaea;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:14px;font-weight:600;color:#111}
.link{font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="tl">
      <div class="tlb" style="background:#ff5f57"></div>
      <div class="tlb" style="background:#ffbd2e"></div>
      <div class="tlb" style="background:#28c840"></div>
    </div>
    <div class="tab-bar" id="tabbar"></div>
  </div>
  <div class="app">
    <div class="rail" id="rail">
      <!-- Logo -->
      <div class="brand" onclick="go('ax')" title="inAX">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="9" fill="#0b0b0b"/>
          <!-- Hex frame -->
          <path d="M18 5 L29 11.5 L29 24.5 L18 31 L7 24.5 L7 11.5 Z" stroke="rgba(255,255,255,.15)" stroke-width="1.2" fill="none"/>
          <!-- Core asterisk -->
          <line x1="18" y1="9" x2="18" y2="27" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="9.5" y1="13.5" x2="26.5" y2="22.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="26.5" y1="13.5" x2="9.5" y2="22.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <!-- Center dot -->
          <circle cx="18" cy="18" r="2.5" fill="#2B5BE8"/>
          <!-- Tip dots -->
          <circle cx="18" cy="9" r="1.5" fill="#2B5BE8"/>
          <circle cx="18" cy="27" r="1.5" fill="#2B5BE8"/>
          <circle cx="9.5" cy="13.5" r="1.5" fill="#2B5BE8"/>
          <circle cx="26.5" cy="22.5" r="1.5" fill="#2B5BE8"/>
          <circle cx="26.5" cy="13.5" r="1.5" fill="#2B5BE8"/>
          <circle cx="9.5" cy="22.5" r="1.5" fill="#2B5BE8"/>
        </svg>
      </div>

      <!-- AX -->
      <div class="ri active" id="ri-ax" onclick="go('ax')" title="업무관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="2" fill="#2B5BE8"/>
          <rect x="12" y="3" width="7" height="7" rx="2" fill="rgba(255,255,255,.3)"/>
          <rect x="3" y="12" width="7" height="7" rx="2" fill="rgba(255,255,255,.3)"/>
          <rect x="12" y="12" width="7" height="7" rx="2" fill="rgba(255,255,255,.3)"/>
        </svg>
      </div>

      <div class="rdiv"></div>

      <!-- PRS -->
      <div class="ri" id="ri-prs" onclick="go('prs')" title="PRS 프로젝트관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="4" width="12" height="2.5" rx="1.2" fill="rgba(255,255,255,.35)"/>
          <rect x="3" y="9" width="16" height="2.5" rx="1.2" fill="#6B63D4"/>
          <rect x="3" y="14" width="9" height="2.5" rx="1.2" fill="rgba(255,255,255,.35)"/>
          <circle cx="17.5" cy="16.5" r="3" fill="#6B63D4"/>
          <path d="M16.3 16.5l1 1 1.8-1.8" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="nbadge" style="background:#6B63D4">2</div>
      </div>

      <!-- FRS -->
      <div class="ri" id="ri-frs" onclick="go('frs')" title="FRS 재무관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="13" width="3.5" height="6" rx="1" fill="#22A84A"/>
          <rect x="9" y="9" width="3.5" height="10" rx="1" fill="rgba(255,255,255,.35)"/>
          <rect x="15" y="5" width="3.5" height="14" rx="1" fill="rgba(255,255,255,.25)"/>
          <path d="M4 11 L10 7 L16 9.5 L19 4" stroke="#22A84A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="19" cy="4" r="1.5" fill="#22A84A"/>
        </svg>
      </div>

      <!-- BRS -->
      <div class="ri" id="ri-brs" onclick="go('brs')" title="BRS 사업관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 3.5L19 8V14L11 18.5L3 14V8L11 3.5Z" stroke="#F26A1B" stroke-width="1.8" fill="rgba(242,106,27,.2)"/>
          <circle cx="11" cy="11" r="3" fill="#F26A1B"/>
          <line x1="11" y1="5" x2="11" y2="8" stroke="#F26A1B" stroke-width="1.4"/>
          <line x1="11" y1="14" x2="11" y2="17" stroke="#F26A1B" stroke-width="1.4"/>
          <line x1="5" y1="9" x2="8" y2="10.5" stroke="#F26A1B" stroke-width="1.4"/>
          <line x1="14" y1="11.5" x2="17" y2="13" stroke="#F26A1B" stroke-width="1.4"/>
        </svg>
      </div>

      <!-- NRS -->
      <div class="ri" id="ri-nrs" onclick="go('nrs')" title="NRS 운영관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 4C7.7 4 5 6.7 5 10C5 14 11 20 11 20C11 20 17 14 17 10C17 6.7 14.3 4 11 4Z" stroke="#2F6FE8" stroke-width="1.8" fill="rgba(47,111,232,.15)"/>
          <circle cx="11" cy="10" r="2.5" fill="#2F6FE8"/>
        </svg>
        <div class="nbadge">3</div>
      </div>

      <!-- HRS -->
      <div class="ri" id="ri-hrs" onclick="go('hrs')" title="HRS 인사관리">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="8" r="3.5" stroke="#F03C6E" stroke-width="1.8" fill="rgba(240,60,110,.15)"/>
          <path d="M4 19C4 15.7 7.1 13 11 13C14.9 13 18 15.7 18 19" stroke="#F03C6E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- Bottom -->
      <div class="rbottom">
        <div class="ri" title="알림">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2.5C6.8 2.5 5 4.3 5 6.5V11L3.5 13H14.5L13 11V6.5C13 4.3 11.2 2.5 9 2.5Z" stroke="rgba(255,255,255,.5)" stroke-width="1.4" fill="none"/>
            <path d="M7.5 13C7.5 13.8 8.2 14.5 9 14.5S10.5 13.8 10.5 13" stroke="rgba(255,255,255,.5)" stroke-width="1.4" fill="none"/>
          </svg>
          <div class="nbadge">2</div>
        </div>
        <div class="av">이주</div>
      </div>
    </div>

    <div class="snav" id="snav"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<script>
const M = {
  ax: {
    name:'업무관리', accent:'#2B5BE8',
    nav:[{l:'내 업무',id:'my'},{l:'전체 업무',id:'all'}],
    def:'my'
  },
  prs:{
    name:'프로젝트관리', accent:'#6B63D4',
    nav:[{l:'프로젝트 목록',id:'list'},{l:'간트차트',id:'gantt'},{l:'마일스톤',id:'ms'},{s:'설정'},{l:'프로젝트 설정',id:'cfg'}],
    def:'list'
  },
  frs:{
    name:'재무관리', accent:'#22A84A',
    nav:[{l:'대시보드',id:'dash'},{l:'청구서',id:'inv'},{l:'입출금 내역',id:'cash'},{l:'예산 관리',id:'budget'},{s:'보고서'},{l:'월간 리포트',id:'rpt'},{l:'세금계산서',id:'tax'}],
    def:'dash'
  },
  brs:{
    name:'사업관리', accent:'#F26A1B',
    nav:[{l:'대시보드',id:'dash'},{l:'견적서',id:'quote'},{l:'팔로업',id:'fu'},{l:'캘린더',id:'cal'},{l:'딜',id:'deal'},{l:'고객',id:'cust'},{s:'분석'},{l:'MBM',id:'mbm'},{l:'모수 비교',id:'cmp'},{s:'시스템'},{l:'업데이트 노트',id:'rel'},{l:'설정',id:'cfg'}],
    def:'dash'
  },
  nrs:{
    name:'운영관리', accent:'#2F6FE8',
    nav:[{l:'대시보드',id:'dash'},{l:'공지사항',id:'notice'},{l:'승인 요청',id:'appr',badge:'3'},{l:'워크플로우',id:'wf'},{s:'시스템'},{l:'권한 관리',id:'perm'},{l:'설정',id:'cfg'}],
    def:'dash'
  },
  hrs:{
    name:'인사관리', accent:'#F03C6E',
    nav:[{l:'조직도',id:'org'},{l:'임직원',id:'emp'},{l:'근태 관리',id:'att'},{l:'휴가',id:'leave'},{s:'급여'},{l:'급여 명세서',id:'pay'},{l:'연봉 현황',id:'sal'}],
    def:'org'
  }
};

let mod='ax', pg='my';

function go(m){
  mod=m; pg=M[m].def;
  document.querySelectorAll('.ri').forEach(e=>e.classList.remove('active'));
  document.getElementById('ri-'+m).classList.add('active');
  document.documentElement.style.setProperty('--accent',M[m].accent);
  render();
}

function goPage(p){ pg=p; renderSnav(); renderMain(); }

function render(){ renderTab(); renderSnav(); renderMain(); }

function renderTab(){
  const m=M[mod];
  document.getElementById('tabbar').innerHTML=`
    <div class="tab active">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1.5" fill="${m.accent}"/>
        <rect x="7" y="1" width="5" height="5" rx="1.5" fill="${m.accent}" opacity=".4"/>
        <rect x="1" y="7" width="5" height="5" rx="1.5" fill="${m.accent}" opacity=".4"/>
        <rect x="7" y="7" width="5" height="5" rx="1.5" fill="${m.accent}" opacity=".4"/>
      </svg>
      ${m.name}
      <span class="tab-x">×</span>
    </div>
    <div class="tab-add">+</div>`;
}

function renderSnav(){
  const m=M[mod];
  let h=`<div class="snav-hdr">${m.name}</div>`;
  m.nav.forEach(n=>{
    if(n.s){ h+=`<div class="snav-sec">${n.s}</div>`; return; }
    h+=`<div class="snav-item${pg===n.id?' active':''}" onclick="goPage('${n.id}')">${n.l}${n.badge?`<span class="sbadge">${n.badge}</span>`:''}</div>`;
  });
  document.getElementById('snav').innerHTML=h;
}

function renderMain(){
  const el=document.getElementById('main');
  if(mod==='ax') el.innerHTML=renderAX();
  else if(mod==='prs') el.innerHTML=renderPRS();
  else if(mod==='frs') el.innerHTML=renderFRS();
  else if(mod==='brs') el.innerHTML=renderBRS();
  else if(mod==='nrs') el.innerHTML=renderNRS();
  else if(mod==='hrs') el.innerHTML=renderHRS();
}

/* ── AX ─────────────────────────────────────────────────── */
function renderAX(){
  if(pg==='my') return `
    <div class="chdr">
      <div class="ctitle">내 업무</div>
      <div class="hacts">
        <button class="btn btn-s">📋 업무노트</button>
        <button class="btn btn-s">📊 업무정리</button>
        <button class="btn btn-p" style="background:#2B5BE8">+ 업무 추가</button>
      </div>
    </div>
    <div style="padding:12px 32px 0"><div class="sbar" style="width:220px"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="#bbb" stroke-width="1.3"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#bbb" stroke-width="1.3" stroke-linecap="round"/></svg><input placeholder="검색"></div></div>
    <div class="cbody">
      <div class="kban">
        ${kcol('대기','#848484',[
          {n:'PRS UI_홈',due:'D-1',dc:'#f59e0b',sub:'/'},
